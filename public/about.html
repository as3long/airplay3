<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About AirPlay3</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: transparent;
      color: #ddd;
      overflow: hidden;
      user-select: none;
    }
    .container {
      background: rgba(20, 20, 30, 0.92);
      border-radius: 12px;
      padding: 20px 24px;
      margin: 8px;
      height: calc(100vh - 16px);
      display: flex;
      flex-direction: column;
    }
    .close-btn {
      position: absolute; top: 12px; right: 12px;
      width: 28px; height: 28px; border: none; background: rgba(255,255,255,0.08);
      color: #888; border-radius: 6px; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { background: rgba(232,106,46,0.6); color: #fff; }
    .header { text-align: center; margin-bottom: 12px; position: relative; }
    .icon { font-size: 48px; margin-bottom: 6px; }
    .header h2 { font-size: 20px; color: #fff; margin: 0; }
    .version { font-size: 12px; color: #888; }
    .desc { text-align: center; font-size: 13px; color: #888; margin-bottom: 14px; }
    .section h3 {
      font-size: 13px; color: #e86a2e; margin-bottom: 8px;
      padding-bottom: 4px; border-bottom: 2px solid #e86a2e;
    }
    .credits { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.15) transparent; }
    .credits::-webkit-scrollbar { width: 5px; }
    .credits::-webkit-scrollbar-track { background: transparent; }
    .credits::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
    .item { padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .item:last-child { border-bottom: none; }
    .name { display: flex; align-items: center; gap: 8px; }
    .name a { color: #e86a2e; text-decoration: none; font-size: 13px; font-weight: 500; }
    .name a:hover { text-decoration: underline; }
    .license { font-size: 10px; color: #666; background: rgba(255,255,255,0.08); padding: 1px 6px; border-radius: 3px; }
    .detail { font-size: 11px; color: #666; margin-top: 2px; }
  </style>
</head>
<body>
  <div class="container">
    <button class="close-btn" onclick="window.close()">×</button>
    <div class="header">
      <div class="icon">♫</div>
      <h2>AirPlay3</h2>
      <span class="version">v0.1.3</span>
    </div>
    <p class="desc">AirPlay 3 风格的 Windows 桌面音乐播放器</p>
    <div class="section">
      <h3>Open Source Components</h3>
      <div class="credits" id="list"></div>
    </div>
  </div>
  <script>
    const data = [
      ['Tauri','https://tauri.app','MIT/Apache-2.0','桌面应用框架'],
      ['Vue.js','https://vuejs.org','MIT','前端 UI 框架'],
      ['Vite','https://vitejs.dev','MIT','构建工具'],
      ['Pinia','https://pinia.vuejs.org','MIT','状态管理'],
      ['Rust','https://www.rust-lang.org','MIT/Apache-2.0','系统编程语言'],
      ['reqwest','https://github.com/seanmonstar/reqwest','MIT/Apache-2.0','HTTP 客户端'],
      ['lofty','https://github.com/Serial-ATA/lofty-rs','MIT','音频元数据读取'],
      ['zhconv','https://github.com/nickel-org/zhconv','MIT','繁简中文转换'],
      ['LRCLIB','https://lrclib.net','Open','歌词数据库 API'],
    ];
    document.getElementById('list').innerHTML = data.map(d =>
      `<div class="item"><div class="name"><a href="${d[1]}" target="_blank">${d[0]}</a><span class="license">${d[2]}</span></div><div class="detail">${d[3]}</div></div>`
    ).join('');
  </script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>About AirPlay3</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #fafafa;
        color: #333;
        padding: 24px;
      }
      .about-header { text-align: center; margin-bottom: 16px; }
      .about-icon { font-size: 56px; margin-bottom: 8px; }
      .about-header h2 { font-size: 22px; color: #1a1a2e; }
      .about-version { font-size: 13px; color: #888; }
      .about-desc { text-align: center; font-size: 14px; color: #666; margin-bottom: 20px; }
      .about-section h3 {
        font-size: 14px; color: #e86a2e; margin-bottom: 10px;
        padding-bottom: 6px; border-bottom: 2px solid #e86a2e;
      }
      .credits-list { max-height: 320px; overflow-y: auto; }
      .credit-item { padding: 8px 0; border-bottom: 1px solid #eee; }
      .credit-item:last-child { border-bottom: none; }
      .credit-name { display: flex; align-items: center; gap: 8px; }
      .credit-name a { color: #e86a2e; text-decoration: none; font-size: 14px; font-weight: 600; }
      .credit-name a:hover { text-decoration: underline; }
      .credit-license { font-size: 11px; color: #888; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
      .credit-desc { font-size: 12px; color: #888; margin-top: 3px; }
    </style>
  </head>
  <body>
    <div class="about-header">
      <div class="about-icon">♫</div>
      <h2>AirPlay3</h2>
      <span class="about-version">v0.1.3</span>
    </div>
    <p class="about-desc">AirPlay 3 风格的 Windows 桌面音乐播放器</p>
    <div class="about-section">
      <h3>Open Source Components</h3>
      <div class="credits-list" id="credits"></div>
    </div>
    <script>
      const credits = [
        { name: 'Tauri', url: 'https://tauri.app', license: 'MIT/Apache-2.0', desc: '桌面应用框架' },
        { name: 'Vue.js', url: 'https://vuejs.org', license: 'MIT', desc: '前端 UI 框架' },
        { name: 'Vite', url: 'https://vitejs.dev', license: 'MIT', desc: '构建工具' },
        { name: 'Pinia', url: 'https://pinia.vuejs.org', license: 'MIT', desc: '状态管理' },
        { name: 'Rust', url: 'https://www.rust-lang.org', license: 'MIT/Apache-2.0', desc: '系统编程语言' },
        { name: 'reqwest', url: 'https://github.com/seanmonstar/reqwest', license: 'MIT/Apache-2.0', desc: 'HTTP 客户端' },
        { name: 'lofty', url: 'https://github.com/Serial-ATA/lofty-rs', license: 'MIT', desc: '音频元数据读取' },
        { name: 'zhconv', url: 'https://github.com/nickel-org/zhconv', license: 'MIT', desc: '繁简中文转换' },
        { name: 'LRCLIB', url: 'https://lrclib.net', license: 'Open', desc: '歌词数据库 API' },
      ];
      const list = document.getElementById('credits');
      credits.forEach(c => {
        list.innerHTML += `<div class="credit-item"><div class="credit-name"><a href="${c.url}" target="_blank">${c.name}</a><span class="credit-license">${c.license}</span></div><div class="credit-desc">${c.desc}</div></div>`;
      });
    </script>
  </body>
</html>

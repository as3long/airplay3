<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e86a2e"/>
      <stop offset="100%" style="stop-color:#ff8c42"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e86a2e;stop-opacity:0.2"/>
      <stop offset="50%" style="stop-color:#e86a2e;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#ff8c42;stop-opacity:0.2"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="#2a2a3e" stroke-width="8"/>

  <!-- Sound waves -->
  <path d="M180 280 Q200 220 220 280 Q240 340 260 280 Q280 220 300 280" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M160 300 Q190 230 220 300 Q250 370 280 300 Q310 230 340 300" stroke="url(#wave)" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Music note -->
  <g transform="translate(256, 240)">
    <!-- Note stem -->
    <rect x="-4" y="-80" width="8" height="80" rx="4" fill="url(#accent)"/>
    <!-- Note flag -->
    <path d="M4 -80 Q40 -60 30 -30 Q20 -50 4 -50 Z" fill="url(#accent)"/>
    <!-- Note head -->
    <ellipse cx="-8" cy="0" rx="22" ry="16" fill="url(#accent)" transform="rotate(-20 -8 0)"/>
  </g>

  <!-- Play triangle overlay -->
  <g transform="translate(256, 240)" opacity="0.9">
    <path d="M-15 -20 L-15 20 L20 0 Z" fill="white" opacity="0.9"/>
  </g>

  <!-- Inner ring accent -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.3"/>
</svg>
